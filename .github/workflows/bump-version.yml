name: bump-version

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'The optional version string for the next release.'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  bump-version:
    runs-on: ubuntu-24.04
    if: github.event.repository.fork == false

    concurrency:
      group: '${{ github.workflow }}-bump'
      cancel-in-progress: false

    environment:
      name: release
      deployment: false

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.event.repository.default_branch }}
          show-progress: false

      - name: Bump version
        id: bump-version
        shell: pwsh
        env:
          NEXT_VERSION: ${{ inputs.version }}
          RELEASED_VERSION: ${{ github.event.release.tag_name }}
        run: |
          $properties = Join-Path "." "Directory.Build.props"

          $xml = [xml](Get-Content $properties)
          $versionPrefix = $xml.SelectSingleNode('Project/PropertyGroup/VersionPrefix')
          $publishedVersion = $versionPrefix.InnerText

          if (-Not [string]::IsNullOrEmpty(${env:NEXT_VERSION})) {
            $version = [System.Version]::new(${env:NEXT_VERSION})
            $assemblyVersionProperty = $xml.SelectSingleNode('Project/PropertyGroup/AssemblyVersion')
            $assemblyVersion = [System.Version]::new($version.Major, ($version.Major -eq 0 ? $version.Minor : 0), 0, 0)
            $assemblyVersionProperty.InnerText = $assemblyVersion.ToString()
          } elseif (-Not [string]::IsNullOrEmpty(${env:RELEASED_VERSION})) {
            $version = [System.Version]::new(${env:RELEASED_VERSION}.TrimStart('v'))
            $version = [System.Version]::new($version.Major, $version.Minor, $version.Build + 1)
            $assemblyVersionProperty = $xml.SelectSingleNode('Project/PropertyGroup/AssemblyVersion')
            $assemblyVersion = [System.Version]::new($version.Major, ($version.Major -eq 0 ? $version.Minor : 0), 0, 0)
            $assemblyVersionProperty.InnerText = $assemblyVersion.ToString()
          } else {
            $version = [System.Version]::new($publishedVersion)
            $version = [System.Version]::new($version.Major, $version.Minor, $version.Build + 1)
          }

          $updatedVersion = $version.ToString()
          $versionPrefix.InnerText = $updatedVersion

          $packageValidationBaselineVersion = $xml.SelectSingleNode('Project/PropertyGroup/PackageValidationBaselineVersion')
          $packageValidationBaselineVersion.InnerText = $publishedVersion

          $settings = New-Object System.Xml.XmlWriterSettings
          $settings.Encoding = New-Object System.Text.UTF8Encoding($false)
          $settings.Indent = $true
          $settings.OmitXmlDeclaration = $true

          $writer = [System.Xml.XmlWriter]::Create($properties, $settings)

          $xml.Save($writer)

          $writer.Flush()
          $writer.Close()
          $writer = $null

          "" >> $properties

          "version=${updatedVersion}" >> ${env:GITHUB_OUTPUT}

      - name: Get GitHub token
        id: get-github-token
        uses: martincostello/github-automation/actions/get-github-token@8fc3770bb86da77b360a2470cc1f0c5a9f7c9689 # get-github-token/v4.3.2
        with:
          profile-name: write

      - name: Push changes to GitHub
        id: push-changes
        shell: pwsh
        env:
          APP_SLUG: ${{ steps.get-github-token.outputs.app-slug }}
          CHECKOUT_COMMIT: ${{ steps.checkout-code.outputs.commit }}
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }}
          NEXT_VERSION: ${{ steps.bump-version.outputs.version }}
          TOKEN_TYPE: ${{ steps.get-github-token.outputs.token-type }}
        run: |
          $branchName = "bump-version-${env:NEXT_VERSION}"

          $branchProbe = gh api "repos/${env:GITHUB_REPOSITORY}/git/ref/heads/${branchName}" 2>&1

          if ($LASTEXITCODE -eq 0) {
            Write-Output "::notice::Branch ${branchName} already exists."
            "updated-version=false" >> ${env:GITHUB_OUTPUT}
            exit 0
          }

          if ((($branchProbe | Out-String) -notmatch 'HTTP 404')) {
            throw "Failed to check whether branch '${branchName}' exists."
          }

          if (${env:TOKEN_TYPE} -eq "app") {
            $gitUserName = "${env:APP_SLUG}[bot]"
            $gitUserId = gh api "users/${gitUserName}" --jq '.id'
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($gitUserId)) {
              throw "Failed to resolve user ID for GitHub app ${gitUserName}."
            }
            $gitUserEmail = "${gitUserId}+${gitUserName}@users.noreply.github.com"
          } else {
            $identity = gh api "user" | ConvertFrom-Json
            $gitUserName = $identity.login
            $gitUserEmail = if ([string]::IsNullOrEmpty($identity.email)) {
              "$($identity.id)+$($identity.login)@users.noreply.github.com"
            } else {
              $identity.email
            }
          }

          $baseSha = ${env:CHECKOUT_COMMIT}

          $filePath = "Directory.Build.props"
          $fileFullPath = Join-Path ${env:GITHUB_WORKSPACE} $filePath
          $currentFile = gh api "repos/${env:GITHUB_REPOSITORY}/contents/${filePath}?ref=${baseSha}" | ConvertFrom-Json
          $currentContent = $currentFile.content.Replace("`r", "").Replace("`n", "")
          $localContent = [System.Convert]::ToBase64String(
            [System.IO.File]::ReadAllBytes($fileFullPath))

          if ($currentContent -eq $localContent) {
            Write-Output "::error::No changes to commit."
            exit 1
          }

          @{
            ref = "refs/heads/${branchName}"
            sha = $baseSha
          } | ConvertTo-Json -Compress | gh api --method POST "repos/${env:GITHUB_REPOSITORY}/git/refs" --input -

          $query = @'
          mutation($input: CreateCommitOnBranchInput!) {
            createCommitOnBranch(input: $input) {
              commit {
                oid
              }
            }
          }
          '@

          $title = "Bump version"
          $body = @(
            "Bump version to ${env:NEXT_VERSION} for the next release.",
            "",
            "Signed-off-by: ${gitUserName} <${gitUserEmail}>"
          ) -join "`n"

          $payload = @{
            query = $query
            variables = @{
              input = @{
                branch = @{
                  repositoryNameWithOwner = ${env:GITHUB_REPOSITORY}
                  branchName = $branchName
                }
                expectedHeadOid = $baseSha
                message = @{
                  headline = $title
                  body = $body
                }
                fileChanges = @{
                  additions = @(
                    @{
                      path = $filePath
                      contents = $localContent
                    }
                  )
                }
              }
            }
          } | ConvertTo-Json -Depth 20 -Compress

          $headers = @{
            Authorization = "Bearer ${env:GH_TOKEN}"
            Accept = "application/vnd.github+json"
          }

          $result = Invoke-RestMethod `
            -Method POST `
            -Uri ${env:GITHUB_GRAPHQL_URL} `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $payload

          if ($null -ne $result.errors) {
            throw ($result.errors | ConvertTo-Json -Depth 20 -Compress)
          }

          "branch-name=${branchName}" >> ${env:GITHUB_OUTPUT}
          "title=${title}" >> ${env:GITHUB_OUTPUT}
          "updated-version=true" >> ${env:GITHUB_OUTPUT}
          "version=${env:NEXT_VERSION}" >> ${env:GITHUB_OUTPUT}

      - name: Create pull request
        if: steps.push-changes.outputs.updated-version == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ steps.push-changes.outputs.branch-name }}
          NEXT_VERSION: ${{ steps.push-changes.outputs.version }}
          PR_TITLE: ${{ steps.push-changes.outputs.title }}
        with:
          github-token: ${{ steps.get-github-token.outputs.token }}
          script: |
            const nextVersion = process.env.NEXT_VERSION;
            const { repo, owner } = context.repo;
            const workflowUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const { data: pr } = await github.rest.pulls.create({
              title: process.env.PR_TITLE,
              owner,
              repo,
              head: process.env.HEAD_BRANCH,
              base: process.env.BASE_BRANCH,
              draft: true,
              body: [
                `Bump version to \`${nextVersion}\` for the next release.`,
                '',
                `This pull request was generated by [GitHub Actions](${workflowUrl}).`
              ].join('\n')
            });

            core.notice(`Created pull request ${owner}/${repo}#${pr.number}: ${pr.html_url}`);

            try {
              const { data: milestones } = await github.rest.issues.listMilestones({
                owner,
                repo,
                state: 'open',
              });

              const title = `v${nextVersion}`;
              let milestone = milestones.find((p) => p.title === title);

              if (!milestone) {
                const created = await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title,
                });
                milestone = created.data;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: pr.number,
                milestone: milestone.number
              });
            } catch (error) {
              // Ignore
            }

  close-milestone:
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'

    concurrency:
      group: '${{ github.workflow }}-milestone'
      cancel-in-progress: false

    permissions:
      issues: write

    steps:

      - name: Close milestone
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_DATE: ${{ github.event.release.published_at }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { repo, owner } = context.repo;

            const { data: milestones } = await github.rest.issues.listMilestones({
              owner,
              repo,
              state: 'open',
            });

            const milestone = milestones.find((p) => p.title === process.env.RELEASE_VERSION);

            if (!milestone) {
              return;
            }

            try {
              await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: milestone.number,
                state: 'closed',
                due_on: process.env.RELEASE_DATE,
              });
            } catch (error) {
              // Ignore
            }
